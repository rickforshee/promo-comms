{% extends "base.html" %}
{% block title %}Inbox — Promo Comms{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Inbox</h2>
</div>

<form id="search-form" onsubmit="return false;">
<div class="search-bar">
    <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
        </svg>
        <input type="text" id="search-input" name="q" class="search-input"
               placeholder="Search PO#, job#, tracking#, subject, vendor, sender…"
               value="{{ query or '' }}" autocomplete="off"
               hx-get="/threads/search"
               hx-trigger="input changed delay:300ms, search"
               hx-target="#thread-results"
               hx-include="#search-form"
               hx-indicator="#search-spinner">
        <span id="search-spinner" class="htmx-indicator search-spinner">⟳</span>
    </div>

    <select id="link-filter" name="link_filter" class="filter-select"
            hx-get="/threads/search"
            hx-trigger="change"
            hx-target="#thread-results"
            hx-include="#search-form">
        <option value="all" {% if (link_filter or 'all') == 'all' %}selected{% endif %}>All threads</option>
        <option value="mine" {% if link_filter == 'mine' %}selected{% endif %}>Assigned to me</option>
        <option value="has_po" {% if link_filter == 'has_po' %}selected{% endif %}>Has PO links</option>
        <option value="has_job" {% if link_filter == 'has_job' %}selected{% endif %}>Has job links</option>
        <option value="has_tracking" {% if link_filter == 'has_tracking' %}selected{% endif %}>Has tracking</option>
        <option value="unlinked" {% if link_filter == 'unlinked' %}selected{% endif %}>Unlinked only</option>
    </select>

    <select id="status-filter" name="status_filter" class="filter-select"
            hx-get="/threads/search"
            hx-trigger="change"
            hx-target="#thread-results"
            hx-include="#search-form">
        <option value="all" {% if (status_filter or 'all') == 'all' %}selected{% endif %}>Any status</option>
        <option value="open" {% if status_filter == 'open' %}selected{% endif %}>Open</option>
        <option value="pending" {% if status_filter == 'pending' %}selected{% endif %}>Pending</option>
        <option value="resolved" {% if status_filter == 'resolved' %}selected{% endif %}>Resolved</option>
        <option value="closed" {% if status_filter == 'closed' %}selected{% endif %}>Closed</option>
    </select>
</div>

<button type="button" class="filters-toggle-btn" id="filters-toggle-btn">
    <span>Filters<span class="filters-active-badge" id="filters-count-badge" style="display:none;"></span></span>
    <i class="chevron">▾</i>
</button>

<div id="extra-filters" class="extra-filters-panel">
<div class="search-bar">
    <input type="text" id="sender-filter" name="sender_filter" class="search-input"
           style="padding-left:12px;"
           placeholder="Filter by sender…"
           value="{{ sender_filter or '' }}"
           hx-get="/threads/search"
           hx-trigger="input changed delay:400ms, search"
           hx-target="#thread-results"
           hx-include="#search-form">
    <select id="assigned-filter" name="assigned_filter" class="filter-select"
            hx-get="/threads/search"
            hx-trigger="change"
            hx-target="#thread-results"
            hx-include="#search-form">
        <option value="all" {% if (assigned_filter or 'all') == 'all' %}selected{% endif %}>Any assignee</option>
        <option value="unassigned" {% if assigned_filter == 'unassigned' %}selected{% endif %}>Unassigned</option>
        {% for u in users %}
        <option value="{{ u.id }}" {% if assigned_filter == u.id | string %}selected{% endif %}>{{ u.display_name or u.email }}</option>
        {% endfor %}
    </select>
</div>

<div class="date-filter-bar">
    <label class="date-filter-label">From</label>
    <input type="date" name="date_from" class="date-input"
           value="{{ date_from or '' }}"
           hx-get="/threads/search"
           hx-trigger="change"
           hx-target="#thread-results"
           hx-include="#search-form">
    <label class="date-filter-label">To</label>
    <input type="date" name="date_to" class="date-input"
           value="{{ date_to or '' }}"
           hx-get="/threads/search"
           hx-trigger="change"
           hx-target="#thread-results"
           hx-include="#search-form">
    <button type="button" class="btn-clear-dates" onclick="
        this.closest('form').querySelectorAll('input[type=date]').forEach(i => i.value = '');
        htmx.trigger('#search-input', 'search');
    ">Clear dates</button>
</div>
</div><!-- #extra-filters -->
</form>

<script>
(function () {
    var btn = document.getElementById('filters-toggle-btn');
    var panel = document.getElementById('extra-filters');
    var badge = document.getElementById('filters-count-badge');

    function countActive() {
        var n = 0;
        var sender = document.getElementById('sender-filter');
        var assignee = document.getElementById('assigned-filter');
        var df = panel.querySelector('[name="date_from"]');
        var dt = panel.querySelector('[name="date_to"]');
        if (sender && sender.value) n++;
        if (assignee && assignee.value && assignee.value !== 'all') n++;
        if (df && df.value) n++;
        if (dt && dt.value) n++;
        return n;
    }

    function updateBadge() {
        var n = countActive();
        if (n > 0) { badge.textContent = n; badge.style.display = 'inline'; }
        else { badge.style.display = 'none'; }
    }

    if (countActive() > 0) {
        panel.classList.add('open');
        btn.classList.add('open');
    }

    btn.addEventListener('click', function () {
        panel.classList.toggle('open');
        btn.classList.toggle('open');
    });

    updateBadge();
    panel.addEventListener('change', updateBadge);
    panel.addEventListener('input', updateBadge);
})();
</script>

<div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
    <a id="export-csv-link" href="/threads/export.csv" class="btn-clear-dates" style="text-decoration:none;">
        ↓ Export CSV
    </a>
</div>
<script>
(function () {
    function updateExportLink() {
        var form = document.getElementById('search-form');
        if (!form) return;
        var params = new URLSearchParams();
        form.querySelectorAll('input, select').forEach(function (el) {
            if (el.name && el.value) params.set(el.name, el.value);
        });
        document.getElementById('export-csv-link').href = '/threads/export.csv?' + params.toString();
    }
    updateExportLink();
    document.getElementById('search-form').addEventListener('change', updateExportLink);
    document.getElementById('search-form').addEventListener('input', updateExportLink);
})();
</script>

<div id="thread-results">
    {% include "threads/results_partial.html" %}
</div>
{% endblock %}
