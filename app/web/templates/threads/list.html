{% extends "base.html" %}
{% block title %}Inbox — Promo Comms{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Inbox</h2>
</div>

<div class="search-bar">
    <div class="search-input-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
        </svg>
        <input
            type="text"
            id="search-input"
            name="q"
            class="search-input"
            placeholder="Search PO#, job#, tracking#, subject, vendor…"
            value="{{ query }}"
            autocomplete="off"
            hx-get="/threads/search"
            hx-trigger="input changed delay:300ms, search"
            hx-target="#thread-results"
            hx-include="#link-filter"
            hx-indicator="#search-spinner"
        >
        <span id="search-spinner" class="htmx-indicator search-spinner">⟳</span>
    </div>
    <select
        id="link-filter"
        name="link_filter"
        class="filter-select"
        hx-get="/threads/search"
        hx-trigger="change"
        hx-target="#thread-results"
        hx-include="#search-input"
    >
        <option value="all"          {% if link_filter == 'all'          %}selected{% endif %}>All threads</option>
        <option value="has_po"       {% if link_filter == 'has_po'       %}selected{% endif %}>Has PO links</option>
        <option value="has_job"      {% if link_filter == 'has_job'      %}selected{% endif %}>Has job links</option>
        <option value="has_tracking" {% if link_filter == 'has_tracking' %}selected{% endif %}>Has tracking</option>
        <option value="unlinked"     {% if link_filter == 'unlinked'     %}selected{% endif %}>Unlinked only</option>
    </select>
</div>

<div id="thread-results">
    {% include "threads/results_partial.html" %}
</div>
{% endblock %}
