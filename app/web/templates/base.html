<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Promo Comms{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% if current_user is defined and current_user %}
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand" style="text-decoration:none;">
    <img src="/static/img/vivid-logo-white.png" alt="Vivid Impact" style="height:30px; margin-right:10px; vertical-align:middle; opacity:0.95;">
    <span>Promo Command Center</span>
</a>
        <div class="navbar-links">
            <a href="/threads" {% if request.url.path.startswith('/threads') %}class="nav-active"{% endif %}>Inbox</a>
            <a href="/dashboard" {% if request.url.path.startswith('/dashboard') %}class="nav-active"{% endif %}>Dashboard</a>
            <a href="/reports" {% if request.url.path.startswith('/reports') %}class="nav-active"{% endif %}>Reports</a>
            <div class="nav-user-menu">
                <button class="nav-user-btn" onclick="toggleUserMenu(event)">
                    <div class="initials-badge initials-badge-sm">
                        {{ ((current_user.display_name or current_user.email) or "?")[:2].upper() }}
                    </div>
                    <span class="nav-user-name">{{ current_user.display_name or current_user.email }}</span>
                    <span class="nav-caret">▾</span>
                </button>
                <div class="nav-dropdown" id="nav-dropdown">
                    <a href="/profile" class="nav-dropdown-item">My Profile</a>
                    {% if current_user.role.value == "admin" %}
                    <div class="nav-dropdown-divider"></div>
                    <a href="/admin/users" class="nav-dropdown-item">Manage Users</a>
                    {% endif %}
                    <div class="nav-dropdown-divider"></div>
                    <a href="/logout" class="nav-dropdown-item nav-dropdown-item-danger">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <script>
    function toggleUserMenu(e) {
        e.stopPropagation();
        document.getElementById('nav-dropdown').classList.toggle('open');
    }
    document.addEventListener('click', function() {
        document.getElementById('nav-dropdown')?.classList.remove('open');
    });
    </script>
    {% endif %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
