<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Promo Comms{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% if current_user is defined and current_user %}
    <nav class="navbar">
        <div class="navbar-brand">Promo Comms</div>
        <div class="navbar-links">
            <a href="/threads">Inbox</a>
            <span class="navbar-user">{{ current_user.display_name or current_user.email }}</span>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </nav>
    {% endif %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
